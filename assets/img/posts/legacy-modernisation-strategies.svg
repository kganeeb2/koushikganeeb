<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="max-width:100%;display:block;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#475569"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#10b981"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" fill="#0f172a" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="40" fill="#1e293b" rx="12"/>
  <rect x="0" y="26" width="800" height="14" fill="#1e293b"/>
  <text x="400" y="26" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f1f5f9" letter-spacing="0.3">Strangler Fig Pattern — Legacy Modernisation via Progressive Service Extraction</text>

  <!-- ── PHASE LABELS ── -->
  <text x="90" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#94a3b8" letter-spacing="1.5">PHASE 1</text>
  <text x="380" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#94a3b8" letter-spacing="1.5">PHASE 2</text>
  <text x="660" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#94a3b8" letter-spacing="1.5">PHASE 3</text>

  <!-- Phase separators -->
  <line x1="236" y1="50" x2="236" y2="308" stroke="#1e293b" stroke-width="2"/>
  <line x1="516" y1="50" x2="516" y2="308" stroke="#1e293b" stroke-width="2"/>

  <!-- ══════════════════════════════════════
       PHASE 1: Facade Added
       ══════════════════════════════════════ -->

  <!-- Clients -->
  <rect x="14" y="64" width="70" height="26" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="49" y="81" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#93c5fd">Web Client</text>
  <rect x="92" y="64" width="70" height="26" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="127" y="81" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#93c5fd">Mobile App</text>

  <!-- Arrow to Facade -->
  <line x1="49" y1="90" x2="49" y2="108" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="127" y1="90" x2="127" y2="108" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Facade -->
  <rect x="14" y="108" width="148" height="34" rx="7" fill="#3d2200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="88" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fcd34d">Facade / API Gateway</text>
  <text x="88" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Route · Auth · Rate-limit</text>

  <!-- Arrow to Monolith -->
  <line x1="88" y1="142" x2="88" y2="158" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Monolith (full) -->
  <rect x="14" y="158" width="148" height="100" rx="8" fill="#3d0a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="88" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fca5a5">Monolith</text>
  <text x="88" y="194" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Orders · Users · Billing</text>
  <text x="88" y="209" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Inventory · Auth · Notif</text>
  <text x="88" y="224" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Reports · Search · CMS</text>
  <text x="88" y="244" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#ef4444">100% traffic</text>

  <!-- DB -->
  <rect x="36" y="272" width="104" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="88" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#94a3b8">Shared Database</text>
  <line x1="88" y1="258" x2="88" y2="272" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Phase 1 annotation -->
  <text x="88" y="316" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#f59e0b">Facade intercepts all traffic.</text>
  <text x="88" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#f59e0b">No code changes yet.</text>

  <!-- ══════════════════════════════════════
       PHASE 2: Services extracted at edges
       ══════════════════════════════════════ -->

  <!-- Clients -->
  <rect x="294" y="64" width="70" height="26" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="329" y="81" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#93c5fd">Web Client</text>
  <rect x="372" y="64" width="70" height="26" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="407" y="81" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#93c5fd">Mobile App</text>

  <!-- Arrows to facade -->
  <line x1="329" y1="90" x2="329" y2="108" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="407" y1="90" x2="380" y2="108" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Facade / Router -->
  <rect x="294" y="108" width="148" height="34" rx="7" fill="#3d2200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="368" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fcd34d">Facade / Router</text>
  <text x="368" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Feature-flag routing</text>

  <!-- Arrow to new services -->
  <line x1="294" y1="125" x2="248" y2="162" stroke="#10b981" stroke-width="1.3" marker-end="url(#arr-green)"/>
  <line x1="442" y1="125" x2="470" y2="162" stroke="#10b981" stroke-width="1.3" marker-end="url(#arr-green)"/>

  <!-- Auth service (new) -->
  <rect x="244" y="162" width="100" height="38" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="294" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6ee7b7">Auth Service</text>
  <text x="294" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">JWT · OAuth 2.0</text>

  <!-- Notification service (new) -->
  <rect x="466" y="162" width="100" height="38" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="516" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6ee7b7">Notif Service</text>
  <text x="516" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Email · SMS · Push</text>

  <!-- Monolith (shrinking) -->
  <rect x="296" y="162" width="164" height="80" rx="8" fill="#3d0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="378" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fca5a5">Monolith (shrinking)</text>
  <text x="378" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Orders · Users · Billing</text>
  <text x="378" y="213" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Inventory · Search · CMS</text>
  <text x="378" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#ef4444">~70% traffic</text>

  <!-- Arrow to facade (remaining) -->
  <line x1="368" y1="142" x2="368" y2="162" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- DB split indicator -->
  <rect x="244" y="260" width="100" height="24" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="294" y="276" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#6ee7b7">Service-owned DB</text>
  <rect x="360" y="260" width="104" height="24" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="412" y="276" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Shared DB (shrinking)</text>
  <line x1="294" y1="200" x2="294" y2="260" stroke="#10b981" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arr-green)"/>
  <line x1="378" y1="242" x2="412" y2="260" stroke="#475569" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- Phase 2 annotation -->
  <text x="368" y="316" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#10b981">Edge services extracted first</text>
  <text x="368" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#10b981">(auth, notifications, search).</text>

  <!-- ══════════════════════════════════════
       PHASE 3: Core replaced
       ══════════════════════════════════════ -->

  <!-- Clients -->
  <rect x="574" y="64" width="70" height="26" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="609" y="81" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#93c5fd">Web Client</text>
  <rect x="652" y="64" width="70" height="26" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="687" y="81" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#93c5fd">Mobile App</text>

  <!-- Arrows to facade -->
  <line x1="609" y1="90" x2="609" y2="108" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="687" y1="90" x2="660" y2="108" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Facade -->
  <rect x="556" y="108" width="148" height="34" rx="7" fill="#3d2200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="630" y="122" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fcd34d">Facade / Router</text>
  <text x="630" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Near-zero monolith traffic</text>

  <!-- New Microservices (grid) -->
  <rect x="534" y="155" width="88" height="32" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="578" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#6ee7b7">Orders Svc</text>
  <text x="578" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748b">Kafka · Postgres</text>

  <rect x="630" y="155" width="88" height="32" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="674" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#6ee7b7">Billing Svc</text>
  <text x="674" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748b">Stripe · events</text>

  <rect x="534" y="195" width="88" height="32" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="578" y="208" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#6ee7b7">Inventory Svc</text>
  <text x="578" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748b">Redis · DynamoDB</text>

  <rect x="630" y="195" width="88" height="32" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="1.2"/>
  <text x="674" y="208" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#6ee7b7">Search Svc</text>
  <text x="674" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748b">Elasticsearch</text>

  <!-- Monolith (vestigial) -->
  <rect x="596" y="236" width="68" height="28" rx="5" fill="#3d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="630" y="249" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#fca5a5">Monolith</text>
  <text x="630" y="260" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">&lt;5% traffic</text>

  <!-- Arrows facade → services -->
  <line x1="590" y1="142" x2="578" y2="155" stroke="#10b981" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <line x1="640" y1="142" x2="660" y2="155" stroke="#10b981" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <line x1="578" y1="187" x2="578" y2="195" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="674" y1="187" x2="674" y2="195" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="630" y1="142" x2="630" y2="236" stroke="#ef4444" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Event bus -->
  <rect x="534" y="278" width="184" height="22" rx="5" fill="#2d1a5e" stroke="#a855f7" stroke-width="1"/>
  <text x="626" y="293" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#d8b4fe">Event Bus (Kafka) — async service communication</text>

  <!-- Phase 3 annotation -->
  <text x="630" y="316" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#6ee7b7">Core domain fully replaced by</text>
  <text x="630" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#6ee7b7">independently deployed services.</text>

  <!-- ── Bottom: Key Principles bar ── -->
  <rect x="14" y="346" width="772" height="64" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="400" y="364" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="1">KEY PRINCIPLES</text>

  <rect x="26" y="372" width="170" height="28" rx="5" fill="#0f172a" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="111" y="384" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#fcd34d">Start at the edges, not the core</text>
  <text x="111" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748b">Auth, notifications, file processing first</text>

  <rect x="208" y="372" width="170" height="28" rx="5" fill="#0f172a" stroke="#10b981" stroke-width="0.8"/>
  <text x="293" y="384" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#6ee7b7">Feature flags control routing</text>
  <text x="293" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748b">Instant rollback without deploy</text>

  <rect x="390" y="372" width="170" height="28" rx="5" fill="#0f172a" stroke="#a855f7" stroke-width="0.8"/>
  <text x="475" y="384" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#d8b4fe">Observability before cutting</text>
  <text x="475" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748b">Trace, log, profile every boundary</text>

  <rect x="572" y="372" width="202" height="28" rx="5" fill="#0f172a" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="673" y="384" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#93c5fd">New features outside monolith</text>
  <text x="673" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#64748b">Forces clean interfaces from day one</text>

  <!-- Caption -->
  <text x="400" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569">The Strangler Fig never big-bangs: the facade owns traffic, services own their data, and the monolith shrinks incrementally</text>
</svg>
