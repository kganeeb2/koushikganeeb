<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="max-width:100%;display:block;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#475569"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#10b981"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#0f172a" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="40" fill="#1e293b" rx="12"/>
  <rect x="0" y="26" width="800" height="14" fill="#1e293b"/>
  <text x="400" y="26" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f1f5f9" letter-spacing="0.3">Data Movement Pipeline — Batch ETL and Real-Time Streaming</text>

  <!-- ── SOURCES column ── -->
  <text x="22" y="60" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#94a3b8" letter-spacing="1.5">SOURCES</text>

  <rect x="14" y="68" width="130" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="79" y="87" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#93c5fd">PostgreSQL / Oracle</text>

  <rect x="14" y="106" width="130" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="79" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#93c5fd">REST APIs / SaaS</text>

  <rect x="14" y="144" width="130" height="30" rx="6" fill="#3d2200" stroke="#f59e0b" stroke-width="1"/>
  <text x="79" y="163" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fcd34d">Kafka / Kinesis</text>

  <rect x="14" y="182" width="130" height="30" rx="6" fill="#3d2200" stroke="#f59e0b" stroke-width="1"/>
  <text x="79" y="201" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fcd34d">IoT / Sensors</text>

  <rect x="14" y="220" width="130" height="30" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="79" y="239" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6ee7b7">S3 / File Exports</text>

  <!-- ── BATCH PATH (top) ── -->
  <!-- Extract -->
  <text x="174" y="82" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#94a3b8" letter-spacing="1.5">BATCH PATH</text>
  <rect x="164" y="88" width="96" height="50" rx="7" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="212" y="109" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#93c5fd">Extract</text>
  <text x="212" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">SQL · JDBC · API</text>

  <!-- Transform -->
  <rect x="276" y="88" width="96" height="50" rx="7" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="324" y="109" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#d8b4fe">Transform</text>
  <text x="324" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">dbt · Spark · Glue</text>

  <!-- Validate -->
  <rect x="388" y="88" width="96" height="50" rx="7" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="436" y="109" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fcd34d">Validate</text>
  <text x="436" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Great Expectations</text>

  <!-- Load -->
  <rect x="500" y="88" width="96" height="50" rx="7" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <text x="548" y="109" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#6ee7b7">Load</text>
  <text x="548" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">COPY · MERGE · Upsert</text>

  <!-- Arrows batch path -->
  <line x1="144" y1="83" x2="164" y2="110" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="144" y1="121" x2="164" y2="115" stroke="#3b82f6" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="260" y1="113" x2="276" y2="113" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="372" y1="113" x2="388" y2="113" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="484" y1="113" x2="500" y2="113" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STREAMING PATH (bottom) ── -->
  <text x="174" y="186" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#94a3b8" letter-spacing="1.5">STREAMING PATH</text>

  <!-- Ingest -->
  <rect x="164" y="194" width="96" height="50" rx="7" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="212" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fcd34d">Ingest</text>
  <text x="212" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Kafka · Kinesis · Pub/Sub</text>

  <!-- Stream Process -->
  <rect x="276" y="194" width="96" height="50" rx="7" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="324" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fca5a5">Stream Process</text>
  <text x="324" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Flink · Spark Streaming</text>

  <!-- Enrich -->
  <rect x="388" y="194" width="96" height="50" rx="7" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="436" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#d8b4fe">Enrich</text>
  <text x="436" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Join · Aggregate · ML score</text>

  <!-- Sink -->
  <rect x="500" y="194" width="96" height="50" rx="7" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <text x="548" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#6ee7b7">Sink</text>
  <text x="548" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Elasticsearch · Redis · DWH</text>

  <!-- Arrows streaming path -->
  <line x1="144" y1="159" x2="180" y2="210" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arr-gold)"/>
  <line x1="144" y1="197" x2="164" y2="214" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arr-gold)"/>
  <line x1="260" y1="219" x2="276" y2="219" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="372" y1="219" x2="388" y2="219" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="484" y1="219" x2="500" y2="219" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── TARGETS column ── -->
  <text x="626" y="60" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#94a3b8" letter-spacing="1.5">TARGETS</text>

  <rect x="614" y="68" width="170" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="699" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#93c5fd">Data Warehouse</text>
  <text x="699" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Snowflake · BigQuery · Redshift</text>

  <rect x="614" y="116" width="170" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="699" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6ee7b7">Data Lake / Lakehouse</text>
  <text x="699" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Delta Lake · Apache Iceberg</text>

  <rect x="614" y="164" width="170" height="40" rx="6" fill="#2d1a5e" stroke="#a855f7" stroke-width="1"/>
  <text x="699" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#d8b4fe">NoSQL / Real-time Store</text>
  <text x="699" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Cassandra · MongoDB · Redis</text>

  <rect x="614" y="212" width="170" height="40" rx="6" fill="#3d2200" stroke="#f59e0b" stroke-width="1"/>
  <text x="699" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fcd34d">Search / Analytics</text>
  <text x="699" y="244" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Elasticsearch · ClickHouse</text>

  <!-- Arrows to targets -->
  <line x1="596" y1="113" x2="614" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="596" y1="113" x2="614" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="596" y1="219" x2="614" y2="196" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="596" y1="219" x2="614" y2="230" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Orchestration bar -->
  <rect x="164" y="270" width="436" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="382" y="287" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#f1f5f9">Orchestration &amp; Monitoring</text>
  <text x="382" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Apache Airflow · Prefect · Dagster · Temporal — schedule, retry, alert, lineage</text>

  <!-- Observability bar -->
  <rect x="164" y="324" width="436" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="382" y="341" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#f1f5f9">Data Quality &amp; Observability</text>
  <text x="382" y="359" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Monte Carlo · Great Expectations · dbt tests — freshness, schema drift, volume anomalies</text>

  <!-- Caption -->
  <text x="400" y="412" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Batch and streaming pipelines converge at unified target storage, governed by shared orchestration and data-quality layers</text>
</svg>
