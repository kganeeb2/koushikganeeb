<form action="https://getform.io/f/{{ site.getform_endpoint }}" enctype="multipart/form-data" method="POST">
  <div class="form-group">
    <label class="form-label" for="contact-name">Your Name</label>
    <input class="form-input" type="text" id="contact-name" name="name" placeholder="John Doe"/>
  </div>
  <div class="form-group">
    <label class="form-label" for="contact-email">Your Email</label>
    <input class="form-input" type="email" id="contact-email" name="email" placeholder="john@example.com"/>
  </div>
  <div class="form-group">
    <label class="form-label" for="contact-subject">Subject</label>
    <input class="form-input" type="text" id="contact-subject" name="subject" placeholder="Mentoring, Collaboration, etc."/>
  </div>
  <div class="form-group">
    <label class="form-label" for="contact-message">Message</label>
    <textarea class="form-input" id="contact-message" name="message" placeholder="Tell me about your project or what you'd like to discuss..."></textarea>
  </div>
  <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
    <i class="fa-solid fa-paper-plane"></i> Send Message
  </button>
  <p class="form-note"><i class="fa-solid fa-shield-halved"></i> Form powered by Getform &mdash; your data is safe.</p>
</form>
